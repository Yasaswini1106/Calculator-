<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --bg2: #1a1a1a;
            --bg3: #222;
            --border: rgba(255, 255, 255, 0.08);
            --border2: rgba(255, 255, 255, 0.15);
            --text: #f0f0f0;
            --text2: #888;
            --text3: #555;
            --accent: #e8ff47;
            --accent2: #b8cc1c;
            --accent-dark: #1a1e04;
            --btn-hover: #2a2a2a;
            --btn-active: #333;
            --op-color: #e8ff47;
            --eq-bg: #e8ff47;
            --eq-text: #111;
            --red: #ff5757;
            --blue: #57b8ff;
            --radius: 16px;
            --radius-sm: 10px;
        }

        [data-theme="light"] {
            --bg: #f5f4ef;
            --bg2: #fff;
            --bg3: #eae9e3;
            --border: rgba(0, 0, 0, 0.08);
            --border2: rgba(0, 0, 0, 0.15);
            --text: #111;
            --text2: #666;
            --text3: #aaa;
            --accent: #1a1a1a;
            --accent2: #333;
            --accent-dark: #f0f0f0;
            --btn-hover: #eee;
            --btn-active: #ddd;
            --op-color: #555;
            --eq-bg: #111;
            --eq-text: #f0f0f0;
            --red: #cc2222;
            --blue: #1155cc;
        }

        [data-theme="ocean"] {
            --bg: #0a1628;
            --bg2: #0d1f3c;
            --bg3: #112447;
            --border: rgba(100, 180, 255, 0.1);
            --border2: rgba(100, 180, 255, 0.2);
            --text: #d0eaff;
            --text2: #7aaedc;
            --text3: #3a6a9a;
            --accent: #3ddfff;
            --accent2: #2ab0cc;
            --accent-dark: #041824;
            --btn-hover: #162a4a;
            --btn-active: #1e3560;
            --op-color: #3ddfff;
            --eq-bg: #3ddfff;
            --eq-text: #041824;
            --red: #ff6b6b;
            --blue: #7fccff;
        }

        [data-theme="rose"] {
            --bg: #1a0f14;
            --bg2: #251118;
            --bg3: #2e161e;
            --border: rgba(255, 100, 150, 0.1);
            --border2: rgba(255, 100, 150, 0.2);
            --text: #ffe0ea;
            --text2: #cc7a9a;
            --text3: #7a3a55;
            --accent: #ff8fab;
            --accent2: #d45f80;
            --accent-dark: #1a0710;
            --btn-hover: #331220;
            --btn-active: #3f1828;
            --op-color: #ff8fab;
            --eq-bg: #ff8fab;
            --eq-text: #1a0710;
            --red: #ff5555;
            --blue: #a0c4ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 24px 16px 60px;
        }

        .app {
            width: 100%;
            max-width: 440px;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .app-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text2);
        }

        .theme-picker {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
        }

        .dot:hover {
            transform: scale(1.2);
        }

        .dot.active {
            border-color: var(--text);
        }

        .dot[data-t="dark"] {
            background: #222;
        }

        .dot[data-t="light"] {
            background: #f5f4ef;
            border: 2px solid #ccc;
        }

        .dot[data-t="ocean"] {
            background: #3ddfff;
        }

        .dot[data-t="rose"] {
            background: #ff8fab;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 2px;
            background: var(--bg3);
            border-radius: var(--radius-sm);
            padding: 3px;
            margin-bottom: 12px;
        }

        .tab {
            flex: 1;
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 8px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.15s;
        }

        .tab.active {
            background: var(--bg2);
            color: var(--text);
            border: 1px solid var(--border2);
        }

        /* CARD */
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        /* DISPLAY */
        .display {
            padding: 20px 22px 14px;
            border-bottom: 1px solid var(--border);
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            position: relative;
        }

        .expr-line {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            color: var(--text3);
            min-height: 20px;
            text-align: right;
            word-break: break-all;
        }

        .result-line {
            font-family: 'Space Mono', monospace;
            font-size: 42px;
            font-weight: 700;
            color: var(--text);
            word-break: break-all;
            text-align: right;
            cursor: pointer;
            line-height: 1.1;
            transition: color 0.15s;
        }

        .result-line:hover {
            color: var(--accent);
        }

        .copy-toast {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            background: var(--accent);
            color: var(--eq-text);
            padding: 3px 8px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .copy-toast.show {
            opacity: 1;
        }

        /* MEMORY BAR */
        .mem-bar {
            display: flex;
            gap: 4px;
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .mbtn {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 9px;
            border: 1px solid var(--border2);
            border-radius: 20px;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: all 0.1s;
        }

        .mbtn:hover {
            background: var(--btn-hover);
            color: var(--text);
        }

        .mem-val {
            margin-left: auto;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--accent);
        }

        /* MODE TOGGLE */
        .mode-row {
            display: flex;
            padding: 8px 14px;
            gap: 6px;
            border-bottom: 1px solid var(--border);
        }

        .mode-btn {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border: 1px solid var(--border2);
            border-radius: 20px;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.15s;
        }

        .mode-btn.active {
            background: var(--accent);
            color: var(--eq-text);
            border-color: var(--accent);
        }

        /* SCIENTIFIC ROW */
        .sci-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border-bottom: 1px solid var(--border);
        }

        /* BUTTONS */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
        }

        .btn {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 500;
            padding: 18px 8px;
            border: none;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            cursor: pointer;
            transition: background 0.1s, transform 0.08s;
            user-select: none;
        }

        .btn:last-child,
        .btn:nth-child(4n) {
            border-right: none;
        }

        .btn:hover {
            background: var(--btn-hover);
        }

        .btn:active {
            background: var(--btn-active);
            transform: scale(0.94);
        }

        .btn.fn {
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            letter-spacing: 0.02em;
        }

        .btn.fn:hover {
            color: var(--text);
        }

        .btn.op {
            font-size: 20px;
            color: var(--op-color);
        }

        .btn.clear {
            color: var(--red);
            font-weight: 700;
        }

        .btn.eq {
            background: var(--eq-bg);
            color: var(--eq-text);
            font-size: 22px;
            border-right: none;
            border-bottom: none;
            grid-column: span 4;
        }

        .btn.eq:hover {
            opacity: 0.88;
            background: var(--eq-bg);
        }

        /* HISTORY PANEL */
        .history-panel {
            border-top: 1px solid var(--border);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .history-panel.open {
            max-height: 220px;
            overflow-y: auto;
        }

        .hist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px 6px;
        }

        .hist-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text3);
        }

        .hist-clear {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border: 1px solid var(--border2);
            border-radius: 20px;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
        }

        .hist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            cursor: pointer;
            border-top: 1px solid var(--border);
            transition: background 0.1s;
        }

        .hist-item:hover {
            background: var(--btn-hover);
        }

        .hist-expr {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--text2);
        }

        .hist-res {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .empty-hist {
            padding: 16px;
            text-align: center;
            font-size: 13px;
            color: var(--text3);
        }

        /* BOTTOM ROW */
        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-top: 1px solid var(--border);
        }

        .hist-toggle {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 5px 12px;
            border: 1px solid var(--border2);
            border-radius: 20px;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
        }

        /* =================== GRAPH TAB =================== */
        .graph-section {
            padding: 16px;
        }

        .graph-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: stretch;
        }

        .graph-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            align-self: center;
            white-space: nowrap;
        }

        .graph-input {
            flex: 1;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            padding: 10px 14px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s;
        }

        .graph-input:focus {
            border-color: var(--accent);
        }

        .graph-input::placeholder {
            color: var(--text3);
        }

        .plot-btn {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            padding: 10px 18px;
            background: var(--accent);
            color: var(--eq-text);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity 0.15s;
        }

        .plot-btn:hover {
            opacity: 0.85;
        }

        .range-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            align-items: center;
        }

        .range-label {
            font-size: 12px;
            color: var(--text2);
            font-weight: 600;
        }

        .range-input {
            width: 70px;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            padding: 6px 10px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 8px;
            color: var(--text);
            outline: none;
            text-align: center;
        }

        .chart-wrap {
            border-radius: 10px;
            overflow: hidden;
            background: var(--bg3);
            padding: 10px;
            border: 1px solid var(--border);
        }

        /* =================== CONVERTER TAB =================== */
        .conv-section {
            padding: 16px;
        }

        .conv-cat-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }

        .conv-cat {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 5px 12px;
            border: 1px solid var(--border2);
            border-radius: 20px;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.15s;
        }

        .conv-cat.active {
            background: var(--accent);
            color: var(--eq-text);
            border-color: var(--accent);
        }

        .conv-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
        }

        .conv-input {
            flex: 1;
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            padding: 14px 16px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s;
        }

        .conv-input:focus {
            border-color: var(--accent);
        }

        .conv-select {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 14px 12px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            color: var(--text);
            outline: none;
            cursor: pointer;
            min-width: 120px;
        }

        .swap-btn {
            font-size: 20px;
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .swap-btn:hover {
            background: var(--btn-hover);
            color: var(--text);
        }

        .conv-result-box {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 14px;
        }

        .conv-result-num {
            font-family: 'Space Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        .conv-result-label {
            font-size: 13px;
            color: var(--text2);
            margin-top: 2px;
        }

        .conv-quick {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .quick-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
        }

        .quick-label {
            font-size: 11px;
            color: var(--text3);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 3px;
        }

        .quick-val {
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }
    </style>
</head>

<body>
    <div class="app">

        <!-- TOP BAR -->
        <div class="top-bar">
            <span class="app-title">Calc</span>
            <div class="theme-picker">
                <div class="dot active" data-t="dark" title="Dark" onclick="setTheme('dark')"></div>
                <div class="dot" data-t="light" title="Light" onclick="setTheme('light')"></div>
                <div class="dot" data-t="ocean" title="Ocean" onclick="setTheme('ocean')"></div>
                <div class="dot" data-t="rose" title="Rose" onclick="setTheme('rose')"></div>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('calc')">Calculator</button>
            <button class="tab" onclick="showTab('graph')">Graph</button>
            <button class="tab" onclick="showTab('convert')">Convert</button>
        </div>

        <!-- ============ CALCULATOR TAB ============ -->
        <div id="tab-calc">
            <div class="card">
                <div class="display">
                    <div class="copy-toast" id="copy-toast">copied!</div>
                    <div class="expr-line" id="expr-line"></div>
                    <div class="result-line" id="result-line" onclick="copyResult()">0</div>
                </div>

                <div class="mem-bar">
                    <button class="mbtn" onclick="memClear()">MC</button>
                    <button class="mbtn" onclick="memRecall()">MR</button>
                    <button class="mbtn" onclick="memAdd()">M+</button>
                    <button class="mbtn" onclick="memSub()">M−</button>
                    <span class="mem-val" id="mem-val"></span>
                </div>

                <div class="mode-row">
                    <button class="mode-btn active" id="mode-std" onclick="setCalcMode('std')">Standard</button>
                    <button class="mode-btn" id="mode-sci" onclick="setCalcMode('sci')">Scientific</button>
                </div>

                <div class="sci-grid" id="sci-grid" style="display:none;">
                    <button class="btn fn" onclick="sciF('sin(')">sin</button>
                    <button class="btn fn" onclick="sciF('cos(')">cos</button>
                    <button class="btn fn" onclick="sciF('tan(')">tan</button>
                    <button class="btn fn" onclick="sciF('log(')">log</button>
                    <button class="btn fn" onclick="sciF('ln(')">ln</button>
                    <button class="btn fn" onclick="sciF('sqrt(')">√</button>
                    <button class="btn fn" onclick="sciF('pow2')">x²</button>
                    <button class="btn fn" onclick="sciF('pi')">π</button>
                    <button class="btn fn" onclick="sciF('e_c')">e</button>
                    <button class="btn fn" onclick="sciF('fact')">n!</button>
                </div>

                <div class="btn-grid">
                    <button class="btn fn" onclick="press('(')">( </button>
                    <button class="btn fn" onclick="press(')')"> )</button>
                    <button class="btn fn" onclick="pressPct()">%</button>
                    <button class="btn clear" onclick="clearAll()">AC</button>

                    <button class="btn" onclick="press('7')">7</button>
                    <button class="btn" onclick="press('8')">8</button>
                    <button class="btn" onclick="press('9')">9</button>
                    <button class="btn op" onclick="press('÷')">÷</button>

                    <button class="btn" onclick="press('4')">4</button>
                    <button class="btn" onclick="press('5')">5</button>
                    <button class="btn" onclick="press('6')">6</button>
                    <button class="btn op" onclick="press('×')">×</button>

                    <button class="btn" onclick="press('1')">1</button>
                    <button class="btn" onclick="press('2')">2</button>
                    <button class="btn" onclick="press('3')">3</button>
                    <button class="btn op" onclick="press('−')">−</button>

                    <button class="btn" onclick="press('0')">0</button>
                    <button class="btn" onclick="press('.')">.</button>
                    <button class="btn fn" onclick="backspace()">⌫</button>
                    <button class="btn op" onclick="press('+')">+</button>

                    <button class="btn eq" onclick="calculate()">=</button>
                </div>

                <div class="bottom-row">
                    <button class="hist-toggle" onclick="toggleHistory()">History ▾</button>
                </div>

                <div class="history-panel" id="history-panel">
                    <div class="hist-header">
                        <span class="hist-label">Recent</span>
                        <button class="hist-clear" onclick="clearHistory()">Clear all</button>
                    </div>
                    <div id="history-list"></div>
                </div>
            </div>
        </div>

        <!-- ============ GRAPH TAB ============ -->
        <div id="tab-graph" style="display:none;">
            <div class="card">
                <div class="graph-section">
                    <div class="graph-input-row">
                        <span class="graph-label">y =</span>
                        <input class="graph-input" id="fn-input" placeholder="x*x - 2*x + 1" value="Math.sin(x)*x" />
                        <button class="plot-btn" onclick="plotGraph()">Plot</button>
                    </div>
                    <div class="range-row">
                        <span class="range-label">x from</span>
                        <input class="range-input" id="x-min" value="-10" />
                        <span class="range-label">to</span>
                        <input class="range-input" id="x-max" value="10" />
                    </div>
                    <div class="chart-wrap">
                        <canvas id="graph-canvas" height="240"></canvas>
                    </div>
                    <p style="font-size:11px; color:var(--text3); margin-top:8px; font-family:'Space Mono',monospace;">
                        Use: x, Math.sin(x), Math.cos(x), Math.sqrt(x), Math.abs(x), Math.pow(x,3), etc.
                    </p>
                </div>
            </div>
        </div>

        <!-- ============ CONVERTER TAB ============ -->
        <div id="tab-convert" style="display:none;">
            <div class="card">
                <div class="conv-section">
                    <div class="conv-cat-row" id="conv-cats"></div>
                    <div class="conv-row">
                        <input class="conv-input" id="conv-from-val" type="number" value="1" oninput="doConvert()" />
                        <select class="conv-select" id="conv-from-unit" onchange="doConvert()"></select>
                    </div>
                    <div style="display:flex; justify-content:center; margin-bottom:12px;">
                        <button class="swap-btn" onclick="swapUnits()" title="Swap">⇅</button>
                    </div>
                    <div class="conv-result-box">
                        <div class="conv-result-num" id="conv-result-num">—</div>
                        <div class="conv-result-label" id="conv-result-label">Select units above</div>
                    </div>
                    <select class="conv-select" id="conv-to-unit" onchange="doConvert()"
                        style="width:100%; margin-bottom:14px;"></select>
                    <div class="conv-quick" id="conv-quick"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ========== CALCULATOR ==========
        let expr = '', justCalc = false, memory = null, calcMode = 'std';
        let history = [];
        try { history = JSON.parse(localStorage.getItem('calc_hist2') || '[]'); } catch (e) { }

        function press(ch) {
            if (justCalc && /[0-9(]/.test(ch)) { expr = ''; justCalc = false; }
            if (justCalc && /[+\-×÷]/.test(ch)) { justCalc = false; }
            expr += ch; updateDisplay();
        }

        function clearAll() { expr = ''; justCalc = false; updateDisplay(); setRes('0'); }

        function backspace() {
            if (justCalc) { clearAll(); return; }
            expr = expr.slice(0, -1); updateDisplay();
        }

        function pressPct() {
            try { const r = evalE(expr); if (r !== null) { expr = fmt(r / 100); updateDisplay(); setRes(expr); } } catch (e) { }
        }

        function sciF(fn) {
            justCalc = false;
            if (fn === 'pow2') { try { const r = evalE(expr); if (r !== null) { expr = fmt(r * r); updateDisplay(); setRes(expr); } } catch (e) { } return; }
            if (fn === 'pi') { expr += '3.14159265358979'; updateDisplay(); return; }
            if (fn === 'e_c') { expr += '2.71828182845905'; updateDisplay(); return; }
            if (fn === 'fact') {
                try { const r = evalE(expr); if (r !== null && Number.isInteger(r) && r >= 0 && r <= 20) { expr = fmt(factorial(r)); updateDisplay(); setRes(expr); } } catch (e) { } return;
            }
            expr += fn; updateDisplay();
        }

        function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }

        function calculate() {
            if (!expr) return;
            try {
                const r = evalE(expr);
                if (r === null || !isFinite(r)) { setRes('Error'); return; }
                const res = fmt(r);
                history.unshift({ e: expr, r: res });
                if (history.length > 20) history.pop();
                try { localStorage.setItem('calc_hist2', JSON.stringify(history)); } catch (e) { }
                document.getElementById('expr-line').textContent = expr + ' =';
                setRes(res);
                expr = res; justCalc = true;
                renderHistory();
            } catch (e) { setRes('Error'); }
        }

        function evalE(s) {
            if (!s) return null;
            let js = s.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-')
                .replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/tan\(/g, 'Math.tan(')
                .replace(/log\(/g, 'Math.log10(').replace(/ln\(/g, 'Math.log(').replace(/sqrt\(/g, 'Math.sqrt(');
            try { const r = Function('"use strict"; return (' + js + ')')(); return typeof r === 'number' ? r : null; }
            catch (e) { return null; }
        }

        function fmt(n) {
            if (Math.abs(n) > 1e12 || (Math.abs(n) < 1e-8 && n !== 0)) return n.toExponential(4);
            return parseFloat(n.toPrecision(10)).toString();
        }

        function updateDisplay() {
            document.getElementById('expr-line').textContent = expr;
            const live = liveEval();
            if (live) setRes(live);
        }

        function liveEval() {
            try { const r = evalE(expr); if (r !== null && isFinite(r)) return fmt(r); } catch (e) { }
            return null;
        }

        function setRes(v) { document.getElementById('result-line').textContent = v; }

        function copyResult() {
            const val = document.getElementById('result-line').textContent;
            if (val === '0' || val === 'Error') return;
            try { navigator.clipboard.writeText(val); } catch (e) { }
            const t = document.getElementById('copy-toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1400);
        }

        function toggleHistory() {
            document.getElementById('history-panel').classList.toggle('open');
            renderHistory();
        }

        function renderHistory() {
            const el = document.getElementById('history-list');
            if (!history.length) { el.innerHTML = '<div class="empty-hist">No history yet</div>'; return; }
            el.innerHTML = history.map((h, i) => `
    <div class="hist-item" onclick="useHist(${i})">
      <span class="hist-expr">${h.e}</span>
      <span class="hist-res">${h.r}</span>
    </div>`).join('');
        }

        function useHist(i) { expr = history[i].r; justCalc = false; updateDisplay(); setRes(expr); }
        function clearHistory() { history = []; try { localStorage.removeItem('calc_hist2'); } catch (e) { } renderHistory(); }

        function memClear() { memory = null; document.getElementById('mem-val').textContent = ''; }
        function memRecall() { if (memory !== null) { expr = fmt(memory); updateDisplay(); setRes(expr); } }
        function memAdd() { try { const r = evalE(expr); if (r !== null) { memory = (memory || 0) + r; document.getElementById('mem-val').textContent = 'M:' + fmt(memory); } } catch (e) { } }
        function memSub() { try { const r = evalE(expr); if (r !== null) { memory = (memory || 0) - r; document.getElementById('mem-val').textContent = 'M:' + fmt(memory); } } catch (e) { } }

        function setCalcMode(m) {
            calcMode = m;
            document.getElementById('mode-std').classList.toggle('active', m === 'std');
            document.getElementById('mode-sci').classList.toggle('active', m === 'sci');
            document.getElementById('sci-grid').style.display = m === 'sci' ? 'grid' : 'none';
        }

        document.addEventListener('keydown', e => {
            const tag = document.activeElement.tagName;
            if (tag === 'INPUT' || tag === 'SELECT') return;
            if (document.getElementById('tab-calc').style.display === 'none') return;
            if (e.key >= '0' && e.key <= '9') press(e.key);
            else if (e.key === '+') press('+');
            else if (e.key === '-') press('−');
            else if (e.key === '*') press('×');
            else if (e.key === '/') { e.preventDefault(); press('÷'); }
            else if (e.key === '.') press('.');
            else if (e.key === '(') press('(');
            else if (e.key === ')') press(')');
            else if (e.key === 'Enter' || e.key === '=') calculate();
            else if (e.key === 'Backspace') backspace();
            else if (e.key === 'Escape') clearAll();
        });

        renderHistory();

        // ========== TABS ==========
        function showTab(t) {
            ['calc', 'graph', 'convert'].forEach(id => {
                document.getElementById('tab-' + id).style.display = id === t ? 'block' : 'none';
            });
            document.querySelectorAll('.tab').forEach((el, i) => {
                el.classList.toggle('active', ['calc', 'graph', 'convert'][i] === t);
            });
            if (t === 'graph') setTimeout(plotGraph, 100);
        }

        // ========== THEME ==========
        function setTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            document.querySelectorAll('.dot').forEach(d => d.classList.toggle('active', d.dataset.t === t));
            if (window.graphChart) {
                const theme = getComputedStyle(document.documentElement);
                updateChartTheme();
            }
        }

        // ========== GRAPH ==========
        let graphChart = null;

        function plotGraph() {
            const fnStr = document.getElementById('fn-input').value.trim();
            const xMin = parseFloat(document.getElementById('x-min').value) || -10;
            const xMax = parseFloat(document.getElementById('x-max').value) || 10;
            const steps = 300;
            const step = (xMax - xMin) / steps;
            const labels = [], data = [];

            for (let i = 0; i <= steps; i++) {
                const x = xMin + i * step;
                labels.push(parseFloat(x.toFixed(3)));
                try {
                    const y = Function('"use strict"; const x=' + x + '; return ' + fnStr + ';')();
                    data.push(isFinite(y) ? parseFloat(y.toFixed(6)) : null);
                } catch (e) { data.push(null); }
            }

            const style = getComputedStyle(document.documentElement);
            const accent = style.getPropertyValue('--accent').trim();
            const text2 = style.getPropertyValue('--text2').trim();
            const border = style.getPropertyValue('--border').trim();
            const bg3 = style.getPropertyValue('--bg3').trim();

            const ctx = document.getElementById('graph-canvas').getContext('2d');

            if (graphChart) { graphChart.destroy(); }

            graphChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        data,
                        borderColor: accent,
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        spanGaps: true,
                        fill: {
                            target: 'origin',
                            above: accent + '22',
                            below: accent + '11'
                        }
                    }]
                },
                options: {
                    responsive: true,
                    animation: { duration: 400 },
                    plugins: {
                        legend: { display: false }, tooltip: {
                            callbacks: {
                                label: ctx => `y = ${ctx.parsed.y}`
                            },
                            backgroundColor: bg3,
                            titleColor: text2,
                            bodyColor: accent,
                            borderColor: border,
                            borderWidth: 1
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: text2, maxTicksLimit: 8, font: { family: 'Space Mono', size: 10 } },
                            grid: { color: border }
                        },
                        y: {
                            ticks: { color: text2, maxTicksLimit: 8, font: { family: 'Space Mono', size: 10 } },
                            grid: { color: border }
                        }
                    }
                }
            });
        }

        function updateChartTheme() {
            if (!graphChart) return;
            plotGraph();
        }

        // ========== CONVERTER ==========
        const CONV_DATA = {
            Length: {
                units: ['m', 'km', 'cm', 'mm', 'mile', 'yard', 'foot', 'inch'],
                toBase: { m: 1, km: 1000, cm: 0.01, mm: 0.001, mile: 1609.344, yard: 0.9144, foot: 0.3048, inch: 0.0254 }
            },
            Weight: {
                units: ['kg', 'g', 'lb', 'oz', 'tonne', 'stone'],
                toBase: { kg: 1, g: 0.001, lb: 0.453592, oz: 0.0283495, tonne: 1000, stone: 6.35029 }
            },
            Temperature: {
                units: ['°C', '°F', 'K'],
                toBase: null,
                convert(v, from, to) {
                    let c;
                    if (from === '°C') c = v;
                    else if (from === '°F') c = (v - 32) * 5 / 9;
                    else c = v - 273.15;
                    if (to === '°C') return c;
                    if (to === '°F') return c * 9 / 5 + 32;
                    return c + 273.15;
                }
            },
            Area: {
                units: ['m²', 'km²', 'cm²', 'ft²', 'acre', 'hectare'],
                toBase: { 'm²': 1, 'km²': 1e6, 'cm²': 0.0001, 'ft²': 0.092903, 'acre': 4046.86, 'hectare': 10000 }
            },
            Volume: {
                units: ['L', 'mL', 'm³', 'gallon', 'cup', 'fl oz', 'tbsp'],
                toBase: { 'L': 1, 'mL': 0.001, 'm³': 1000, 'gallon': 3.78541, 'cup': 0.236588, 'fl oz': 0.0295735, 'tbsp': 0.0147868 }
            },
            Speed: {
                units: ['m/s', 'km/h', 'mph', 'knot'],
                toBase: { 'm/s': 1, 'km/h': 1 / 3.6, 'mph': 0.44704, 'knot': 0.514444 }
            },
            Time: {
                units: ['s', 'min', 'hr', 'day', 'week', 'month', 'year'],
                toBase: { s: 1, min: 60, hr: 3600, day: 86400, week: 604800, month: 2629800, year: 31557600 }
            },
            Data: {
                units: ['B', 'KB', 'MB', 'GB', 'TB'],
                toBase: { B: 1, KB: 1024, MB: 1048576, GB: 1073741824, TB: 1099511627776 }
            }
        };

        let curCat = 'Length';

        function initConverter() {
            const cats = document.getElementById('conv-cats');
            cats.innerHTML = Object.keys(CONV_DATA).map(c =>
                `<button class="conv-cat${c === curCat ? ' active' : ''}" onclick="selectCat('${c}')">${c}</button>`
            ).join('');
            fillUnits();
            doConvert();
        }

        function selectCat(c) {
            curCat = c;
            document.querySelectorAll('.conv-cat').forEach(b => b.classList.toggle('active', b.textContent === c));
            fillUnits();
            doConvert();
        }

        function fillUnits() {
            const units = CONV_DATA[curCat].units;
            const f = document.getElementById('conv-from-unit');
            const t = document.getElementById('conv-to-unit');
            const opts = units.map(u => `<option value="${u}">${u}</option>`).join('');
            f.innerHTML = opts;
            t.innerHTML = opts;
            if (units.length > 1) t.selectedIndex = 1;
        }

        function doConvert() {
            const fromVal = parseFloat(document.getElementById('conv-from-val').value);
            const fromUnit = document.getElementById('conv-from-unit').value;
            const toUnit = document.getElementById('conv-to-unit').value;
            const cat = CONV_DATA[curCat];
            if (isNaN(fromVal)) { document.getElementById('conv-result-num').textContent = '—'; return; }
            let result;
            if (cat.convert) {
                result = cat.convert(fromVal, fromUnit, toUnit);
            } else {
                const base = fromVal * cat.toBase[fromUnit];
                result = base / cat.toBase[toUnit];
            }
            const fmt2 = v => Math.abs(v) > 1e6 || Math.abs(v) < 0.001 ? v.toExponential(4) : parseFloat(v.toPrecision(7)).toString();
            document.getElementById('conv-result-num').textContent = fmt2(result);
            document.getElementById('conv-result-label').textContent = `${fromVal} ${fromUnit} = ${fmt2(result)} ${toUnit}`;
            renderQuick(fromVal, fromUnit, cat);
        }

        function renderQuick(val, fromUnit, cat) {
            const el = document.getElementById('conv-quick');
            if (!cat.toBase && !cat.convert) { el.innerHTML = ''; return; }
            const units = cat.units.filter(u => u !== fromUnit).slice(0, 4);
            el.innerHTML = units.map(u => {
                let r;
                if (cat.convert) r = cat.convert(val, fromUnit, u);
                else { const base = val * cat.toBase[fromUnit]; r = base / cat.toBase[u]; }
                const fmt2 = v => Math.abs(v) > 1e6 || Math.abs(v) < 0.001 ? v.toExponential(3) : parseFloat(v.toPrecision(5)).toString();
                return `<div class="quick-card"><div class="quick-label">${u}</div><div class="quick-val">${fmt2(r)}</div></div>`;
            }).join('');
        }

        function swapUnits() {
            const f = document.getElementById('conv-from-unit');
            const t = document.getElementById('conv-to-unit');
            const tmp = f.value; f.value = t.value; t.value = tmp;
            doConvert();
        }

        initConverter();
    </script>
</body>

</html>
